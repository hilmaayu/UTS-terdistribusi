services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: proyek1
      MYSQL_ROOT_PASSWORD: rootpassword
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Definisi 7 Backend
  app_1: 
    build: .
    hostname: app-1
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  app_2: 
    build: .
    hostname: app-2
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  app_3: 
    build: .
    hostname: app-3
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  app_4: 
    build: .
    hostname: app-4
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  app_5: 
    build: .
    hostname: app-5
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  app_6: 
    build: .
    hostname: app-6
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  app_7: 
    build: .
    hostname: app-7
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  # NGINX di Port 8104
  nginx:
    image: nginx:latest
    ports:
      - "8104:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app_1
      - app_7